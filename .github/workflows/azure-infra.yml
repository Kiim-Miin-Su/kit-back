name: Azure Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

jobs:
  infra:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create Azure infrastructure
        uses: azure/cli@v2
        with:
          inlineScript: |
            chmod +x infra/azure/create-infra.sh
            export DEPLOY_ENV='${{ inputs.environment }}'
            export PROJECT_NAME='${{ vars.PROJECT_NAME }}'
            export AZURE_CLIENT_ID='${{ vars.AZURE_CLIENT_ID }}'
            export AZURE_LOCATION='${{ vars.AZURE_LOCATION }}'
            export AZURE_RESOURCE_GROUP='${{ vars.AZURE_RESOURCE_GROUP }}'
            export AZURE_ACR_NAME='${{ vars.AZURE_ACR_NAME }}'
            export AZURE_LOG_ANALYTICS_WORKSPACE='${{ vars.AZURE_LOG_ANALYTICS_WORKSPACE }}'
            export AZURE_CONTAINERAPPS_ENV='${{ vars.AZURE_CONTAINERAPPS_ENV }}'
            export AZURE_KEY_VAULT_NAME='${{ vars.AZURE_KEY_VAULT_NAME }}'
            export AZURE_POSTGRES_SERVER_NAME='${{ vars.AZURE_POSTGRES_SERVER_NAME }}'
            export AZURE_POSTGRES_ADMIN_USERNAME='${{ vars.AZURE_POSTGRES_ADMIN_USERNAME }}'
            export AZURE_POSTGRES_DATABASE_NAME='${{ vars.AZURE_POSTGRES_DATABASE_NAME }}'
            export AZURE_POSTGRES_ADMIN_PASSWORD='${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}'
            export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
            export AUTH_TOKEN_SECRET='${{ secrets.AUTH_TOKEN_SECRET }}'
            infra/azure/create-infra.sh
