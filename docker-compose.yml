services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_edu
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_edu"]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    image: node:20-alpine
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             npm run start:dev"
    environment:
      PORT: ${PORT:-4000}
      DATA_SOURCE: prisma
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres@postgres:5432/ai_edu}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-local-dev-auth-token-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "${HOST_PORT:-4000}:${PORT:-4000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.PORT||4000;require('http').get('http://localhost:'+port+'/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  studio:
    image: node:20-alpine
    working_dir: /workspace
    command: >
      sh -c "npx prisma studio --hostname 0.0.0.0 --port 5555 --browser none"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres@postgres:5432/ai_edu}
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "${STUDIO_PORT:-5555}:5555"
    depends_on:
      back:
        condition: service_healthy
    restart: unless-stopped

  front:
    image: node:20-alpine
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${HOST_PORT:-4000}
      NEXT_PUBLIC_DEV_ROLE_BYPASS: ${NEXT_PUBLIC_DEV_ROLE_BYPASS:-false}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ../front:/workspace
      - front_node_modules:/workspace/node_modules
    ports:
      - "${FRONT_HOST_PORT:-3000}:3000"
    depends_on:
      back:
        condition: service_healthy

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  postgres_data:
  node_modules:
  front_node_modules:
